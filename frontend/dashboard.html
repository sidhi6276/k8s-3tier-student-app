<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduPortal — Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dash-body">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">🎓 EduPortal</div>
    <div class="nav-right">
      <span class="nav-user">👤 <span id="nav-username">Admin</span></span>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dash-container">

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card card-blue">
        <div class="stat-icon">👨‍🎓</div>
        <div class="stat-info">
          <h3 id="total-students">0</h3>
          <p>Total Students</p>
        </div>
      </div>
      <div class="stat-card card-purple">
        <div class="stat-icon">📚</div>
        <div class="stat-info">
          <h3 id="total-courses">0</h3>
          <p>Courses</p>
        </div>
      </div>
      <div class="stat-card card-green">
        <div class="stat-icon">☸️</div>
        <div class="stat-info">
          <h3>Live</h3>
          <p>K8s Status</p>
        </div>
      </div>
      <div class="stat-card card-orange">
        <div class="stat-icon">🍃</div>
        <div class="stat-info">
          <h3>Active</h3>
          <p>MongoDB</p>
        </div>
      </div>
    </div>

    <div class="main-grid">

      <!-- Add Student Form -->
      <div class="card form-card">
        <h3>➕ Add New Student</h3>
        <div id="form-msg" class="hidden"></div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="s-name" placeholder="e.g. Priya Sharma" />
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" id="s-age" placeholder="e.g. 20" min="15" max="40"/>
        </div>
        <div class="form-group">
          <label>Course</label>
          <select id="s-course">
            <option value="">Select Course</option>
            <option>Computer Science</option>
            <option>Data Science</option>
            <option>DevOps</option>
            <option>Cloud Computing</option>
            <option>Cybersecurity</option>
          </select>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="s-email" placeholder="e.g. priya@email.com" />
        </div>
        <button class="btn-add" onclick="addStudent()">Add Student 🚀</button>
      </div>

      <!-- Students Table -->
      <div class="card table-card">
        <div class="table-header">
          <h3>📋 All Students</h3>
          <button class="btn-refresh" onclick="loadStudents()">🔄 Refresh</button>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Course</th>
                <th>Email</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="students-tbody">
              <tr>
                <td colspan="5" class="loading-row">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
